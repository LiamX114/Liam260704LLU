<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>六組搶答 · 團隊益智賽（公網版）</title>
<style>
:root{
  --bg:#F2F4F8; --surface:#FFFFFF; --ink:#17233B; --muted:#5B6B85;
  --accent:#2E5BFF; --accent-ink:#FFFFFF; --line:#DDE3EE;
  --ok:#1FA55A; --bad:#E23A3A;
  --t1:#E23A3A; --t2:#F07818; --t3:#D19A00; --t4:#1FA55A; --t5:#2E6BE6; --t6:#8A4FD3;
  --radius:14px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);min-height:100%}
body{padding:16px;display:flex;justify-content:center}
#app{width:100%;max-width:960px}
h1{font-size:1.5rem;font-weight:800;letter-spacing:.02em}
h2{font-size:1.15rem;font-weight:800}
.small{font-size:.82rem;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
  font-family:var(--font);font-size:1rem;font-weight:700;border-radius:12px;padding:14px 22px;
  background:var(--accent);color:var(--accent-ink);min-height:52px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--accent);border:2px solid var(--accent)}
.btn.subtle{background:#E8ECF5;color:var(--ink)}
.btn.danger{background:var(--bad);color:#fff}
.btn.block{width:100%}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input[type=text],textarea,select{font-family:var(--font);font-size:1rem;border:2px solid var(--line);
  border-radius:12px;padding:12px 14px;width:100%;background:#fff;color:var(--ink)}
input:focus,textarea:focus,select:focus,.btn:focus-visible{outline:3px solid rgba(46,91,255,.35);outline-offset:1px}
textarea{min-height:140px;resize:vertical}
label{font-weight:700;font-size:.9rem;display:block;margin:12px 0 6px}
.pin{font-size:3rem;font-weight:900;letter-spacing:.18em;text-align:center;font-variant-numeric:tabular-nums}
.tag{display:inline-block;font-size:.78rem;font-weight:800;padding:3px 10px;border-radius:999px;color:#fff}
.center{text-align:center}
.mt{margin-top:14px}
.qtext{font-size:1.4rem;font-weight:800;line-height:1.45;margin:8px 0 16px}
.opts{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:700px){.opts{grid-template-columns:1fr 1fr}}
.opts.lettersonly{grid-template-columns:repeat(2,1fr)}
@media(min-width:700px){.opts.lettersonly{grid-template-columns:repeat(3,1fr)}}
.opt{display:flex;align-items:center;gap:12px;border:2px solid var(--line);background:#fff;border-radius:12px;
  padding:14px;font-size:1.05rem;font-weight:600;text-align:left;cursor:pointer;min-height:60px;font-family:var(--font);color:var(--ink)}
.opt .idx{flex:none;width:38px;height:38px;border-radius:10px;background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.05rem}
.opt.big{justify-content:center;min-height:76px;font-size:1.35rem;font-weight:900}
.opt.sel{border-color:var(--accent);background:#EBF0FF}
.opt.correct{border-color:var(--ok);background:#E9F7EF}
.opt.correct .idx{background:var(--ok)}
.opt.wrongpick{border-color:var(--bad);background:#FDECEC}
.opt.wrongpick .idx{background:var(--bad)}
.opt:disabled{cursor:default}
.teams{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:700px){.teams{grid-template-columns:repeat(3,1fr)}}
.teambtn{border:none;border-radius:12px;padding:16px 10px;color:#fff;font-weight:800;font-size:1.05rem;cursor:pointer;font-family:var(--font);min-height:58px}
.teambtn.sel{outline:4px solid var(--ink)}
.bars{display:flex;flex-direction:column;gap:10px}
.barrow{display:flex;align-items:center;gap:10px}
.barlabel{flex:none;width:64px;font-weight:800;font-size:.92rem}
.bartrack{flex:1;background:#E8ECF5;border-radius:999px;height:30px;overflow:hidden}
.barfill{height:100%;border-radius:999px;display:flex;align-items:center;justify-content:flex-end;
  padding-right:10px;color:#fff;font-weight:900;font-size:.9rem;min-width:34px;
  transition:width .8s cubic-bezier(.2,.8,.2,1)}
@media(prefers-reduced-motion:reduce){.barfill{transition:none}}
.qlist{display:flex;flex-direction:column;gap:8px}
.qitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.qitem .qt{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.statline{display:flex;gap:18px;flex-wrap:wrap;font-weight:700;margin-top:10px}
.banner{border-radius:12px;padding:14px 16px;font-weight:800;margin-bottom:12px}
.banner.ok{background:#E9F7EF;color:#116A3A}
.banner.bad{background:#FDECEC;color:#9E1F1F}
.banner.info{background:#EBF0FF;color:#1E3FB0}
.err{background:#FDECEC;color:#9E1F1F;border-radius:10px;padding:10px 12px;font-size:.88rem;margin-top:10px;display:none}
.playersline{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pname{font-size:.82rem;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.rank{display:flex;flex-direction:column;gap:8px}
.rankrow{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-weight:800}
.rankrow .pos{width:34px;font-size:1.2rem;font-weight:900}
.rankrow.win{border:3px solid var(--ink);background:#FFF8E1}
.hint{font-size:.85rem;color:var(--muted);line-height:1.6}
code{background:#E8ECF5;border-radius:6px;padding:2px 6px;font-size:.85em}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
"use strict";
/* ================================================================
   ★★★ 第一步：把你的 Firebase 設定貼在下面 ★★★
   來源：Firebase 控制台 → 專案設定 → 你的應用程式 → SDK 設定 → 設定(Config)
   只需要 apiKey / databaseURL / projectId 三項即可運作，其餘照貼無妨。
================================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCf2PuiZi4vpDLnM1lspduE6BqXsnTNrWU",
  databaseURL: "https://light-and-light-up-default-rtdb.firebaseio.com",
  projectId: "light-and-light-up"
};
/* ================================================================ */

const TEAMS = [
  {name:"第一組", hex:"#E23A3A"},
  {name:"第二組", hex:"#F07818"},
  {name:"第三組", hex:"#D19A00"},
  {name:"第四組", hex:"#1FA55A"},
  {name:"第五組", hex:"#2E6BE6"},
  {name:"第六組", hex:"#8A4FD3"},
];
const N_OPT = 6;
const LETTERS = ["A","B","C","D","E","F"];

const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const rid = () => Math.random().toString(36).slice(2,10);
function showErr(m){ const e=$("#err"); if(e){ e.style.display="block"; e.textContent=m; } }
function render(h){ detachAll(); $("#app").innerHTML = h + '<div id="err" class="err"></div>'; }

/* localStorage 安全包裝（無痕模式等情況可能不可用） */
const LS = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  del(k){ try{ localStorage.removeItem(k); }catch(e){} }
};

/* Firebase 初始化 */
let db=null, configOK=false;
try{
  if(firebaseConfig.databaseURL && !firebaseConfig.databaseURL.includes("在這裡貼上")){
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    configOK = true;
  }
}catch(e){ configOK=false; }

/* 監聽器管理：換畫面時全部解除，避免重複觸發 */
let listeners=[];
function attach(ref, ev, cb){ ref.on(ev, cb); listeners.push({ref,ev,cb}); }
function detachAll(){ listeners.forEach(l=>{ try{ l.ref.off(l.ev, l.cb); }catch(e){} }); listeners=[]; }

/* 全域狀態 */
let pin=null;
let round=0;                       // 已進行到第幾題（從 1 開始）
let totals=[0,0,0,0,0,0];
let bank=[];                       // 題庫（僅存在主持人瀏覽器 localStorage）
let me={id:null,name:"",team:-1};  // 玩家
let curAnswerCount=0;

/* ============================================================
   首頁
============================================================ */
function homeScreen(){
  render(`
  <div class="card center">
    <h1>六組搶答 · 團隊益智賽</h1>
    <p class="small mt">主持人現場出題 → 每人手機作答 → 每題統計各組答對人數 → 累計最多者獲勝</p>
    <div class="row mt" style="justify-content:center">
      <button class="btn" id="asHost">我是主持人</button>
      <button class="btn ghost" id="asPlayer">我是玩家</button>
    </div>
  </div>
  ${configOK?"":`<div class="card"><h2>⚠ 尚未完成設定</h2>
    <p class="hint mt">這個檔案還沒填入 Firebase 設定。請主辦人打開 HTML 檔，
    在最上方 <code>firebaseConfig</code> 區塊貼上自己專案的
    <code>apiKey</code>、<code>databaseURL</code>、<code>projectId</code> 後重新上傳。
    未設定前無法建立或加入遊戲。</p></div>`}`);
  $("#asHost").onclick = ()=> configOK?hostEntry():showErr("尚未填入 Firebase 設定，請先完成檔案內的設定步驟。");
  $("#asPlayer").onclick = ()=> configOK?playerJoinScreen():showErr("尚未填入 Firebase 設定，請先完成檔案內的設定步驟。");
}

/* ============================================================
   主持人
============================================================ */
function loadBank(){ try{ bank = JSON.parse(LS.get("quizbank")||"[]")||[]; }catch(e){ bank=[]; } }
function saveBank(){ LS.set("quizbank", JSON.stringify(bank)); }

function hostEntry(){
  loadBank();
  render(`
  <div class="topbar"><h1>主持人</h1><button class="btn subtle" id="back">回首頁</button></div>
  <div class="card">
    <button class="btn block" id="newGame">建立新遊戲（產生新 PIN）</button>
    <label class="mt">或恢復進行中的遊戲（輸入原 PIN）</label>
    <div class="row">
      <input type="text" id="r_pin" inputmode="numeric" maxlength="4" placeholder="4 位數 PIN" style="max-width:180px">
      <button class="btn ghost" id="resume">恢復遊戲</button>
    </div>
    <p class="hint mt">「恢復」用於主持人不小心關掉或重新整理頁面時，接回原本的比分與進度。</p>
  </div>`);
  $("#back").onclick=homeScreen;
  $("#newGame").onclick=async ()=>{
    pin=String(Math.floor(1000+Math.random()*9000));
    round=0; totals=[0,0,0,0,0,0];
    try{
      await db.ref(`g/${pin}`).remove();
      await db.ref(`g/${pin}/state`).set({phase:"lobby", round:0, totals, ts:Date.now()});
    }catch(e){ showErr("無法連線資料庫，請檢查網路與 Firebase 設定/規則。"); return; }
    hostLobby();
  };
  $("#resume").onclick=async ()=>{
    const p=$("#r_pin").value.trim();
    if(!/^\d{4}$/.test(p)){ showErr("請輸入 4 位數 PIN。"); return; }
    let snap;
    try{ snap=await db.ref(`g/${p}/state`).get(); }catch(e){ showErr("無法連線資料庫。"); return; }
    if(!snap.exists()){ showErr("找不到這個 PIN 的遊戲。"); return; }
    const st=snap.val();
    pin=p; round=st.round||0; totals=st.totals||[0,0,0,0,0,0];
    if(st.phase==="lobby") hostLobby();
    else hostQuestionForm();
  };
}

/* ---- 大廳 ---- */
function hostLobby(){
  render(`
  <div class="topbar"><h1>大廳 · 等待玩家加入</h1></div>
  <div class="card center">
    <p class="small">請玩家掃描 QR Code 或開啟網址 → 我是玩家 → 輸入 PIN</p>
    <div class="pin mt">${pin}</div>
  </div>
  <div class="card">
    <h2>已加入玩家 <span id="pcount" class="tag" style="background:var(--accent)">0</span></h2>
    <div id="plist"></div>
  </div>
  <button class="btn block" id="go">出第 1 題</button>`);
  $("#go").onclick=hostQuestionForm;
  watchPlayers();
}
function watchPlayers(){
  attach(db.ref(`g/${pin}/players`), "value", snap=>{
    const val=snap.val()||{};
    const byTeam=[[],[],[],[],[],[]];
    Object.values(val).forEach(p=>{ if(p&&p.t>=0&&p.t<6) byTeam[p.t].push(p.n||"玩家"); });
    const pc=$("#pcount"); if(!pc) return;
    pc.textContent=Object.keys(val).length;
    const pl=$("#plist"); if(!pl) return;
    pl.innerHTML = TEAMS.map((tm,i)=>`
      <div class="mt"><span class="tag" style="background:${tm.hex}">${tm.name} · ${byTeam[i].length} 人</span>
        <div class="playersline">${byTeam[i].map(n=>`<span class="pname" style="background:${tm.hex}">${esc(n)}</span>`).join("")}</div>
      </div>`).join("");
  });
}

/* ---- 現場出題面板 ---- */
function hostQuestionForm(){
  loadBank();
  render(`
  <div class="topbar"><h1>出第 ${round+1} 題</h1>
    <span class="tag" style="background:var(--ink)">PIN ${pin}</span></div>

  <div class="card">
    <label>題目文字（選填。留空＝主持人口頭唸題，玩家畫面只顯示 A～F 按鈕）</label>
    <input type="text" id="f_q" placeholder="可留空">
    ${Array.from({length:N_OPT},(_,i)=>`
      <label>選項 ${LETTERS[i]}（選填）</label>
      <input type="text" id="f_o${i}" placeholder="可留空">`).join("")}
    <label>正確答案（必填）</label>
    <select id="f_c">${LETTERS.map((L,i)=>`<option value="${i}">${L}</option>`).join("")}</select>
    <div class="row mt">
      <button class="btn" id="startQ">開始作答</button>
      <button class="btn subtle" id="saveToBank">同時存入題庫</button>
      <button class="btn ghost" id="finishGame">結束遊戲，公布最終結果</button>
    </div>
    <p class="hint mt">「開始作答」後所有玩家手機會立即出現本題。若選項全部留空，玩家會看到 6 個大按鈕 A～F。</p>
  </div>

  <div class="card">
    <h2>題庫（存在這台裝置的瀏覽器，可先備題、現場一鍵帶入）</h2>
    <div class="qlist mt">
      ${bank.length===0?'<p class="small">題庫是空的。可在上方填好題目後按「同時存入題庫」，或用下方整批匯入。</p>':""}
      ${bank.map((q,i)=>`
        <div class="qitem">
          <span class="tag" style="background:var(--ink)">${i+1}</span>
          <span class="qt">${esc(q.text||"（口頭題）")}</span>
          <span class="small">答案 ${LETTERS[q.correct]}</span>
          <button class="btn subtle" style="min-height:36px;padding:6px 12px" data-use="${i}">帶入</button>
          <button class="btn danger" style="min-height:36px;padding:6px 12px" data-del="${i}">刪除</button>
        </div>`).join("")}
    </div>
    <label class="mt">整批匯入（每題 8 行：題目、6 個選項、正確答案編號 1～6；題間空一行）</label>
    <textarea id="importBox"></textarea>
    <div class="row mt"><button class="btn ghost" id="doImport">匯入題庫</button></div>
  </div>`);

  const readForm=()=>{
    const text=$("#f_q").value.trim();
    const opts=Array.from({length:N_OPT},(_,i)=>$("#f_o"+i).value.trim());
    return {text, opts, correct:+$("#f_c").value};
  };
  $("#startQ").onclick=async ()=>{
    const q=readForm();
    const anyOpt=q.opts.some(o=>o);
    if(anyOpt && q.opts.some(o=>!o)){ showErr("選項請「全部填寫」或「全部留空」，不可只填部分。"); return; }
    round++;
    const state={phase:"q", round, text:q.text||"", opts:anyOpt?q.opts:null, totals, ts:Date.now()};
    try{ await db.ref(`g/${pin}/state`).set(state); }
    catch(e){ round--; showErr("送出失敗，請檢查網路。"); return; }
    hostLive(q);
  };
  $("#saveToBank").onclick=()=>{
    const q=readForm();
    bank.push(q); saveBank(); hostQuestionForm();
  };
  $("#finishGame").onclick=hostFinal;
  document.querySelectorAll("[data-use]").forEach(b=>b.onclick=()=>{
    const q=bank[+b.dataset.use];
    $("#f_q").value=q.text||"";
    for(let i=0;i<N_OPT;i++) $("#f_o"+i).value=(q.opts&&q.opts[i])||"";
    $("#f_c").value=q.correct;
    window.scrollTo({top:0,behavior:"smooth"});
  });
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    bank.splice(+b.dataset.del,1); saveBank(); hostQuestionForm();
  });
  $("#doImport").onclick=()=>{
    const blocks=$("#importBox").value.split(/\n\s*\n/).map(x=>x.trim()).filter(Boolean);
    let ok=0,badN=0;
    for(const bl of blocks){
      const lines=bl.split("\n").map(l=>l.trim()).filter(Boolean);
      if(lines.length!==8){ badN++; continue; }
      const n=parseInt(lines[7],10);
      if(!(n>=1&&n<=6)){ badN++; continue; }
      bank.push({text:lines[0],opts:lines.slice(1,7),correct:n-1}); ok++;
    }
    saveBank();
    if(badN>0) showErr(`已匯入 ${ok} 題；${badN} 題格式不符已略過（需 8 行、末行為 1～6）。`);
    hostQuestionForm();
  };
}

/* ---- 作答中 ---- */
function hostLive(q){
  const hasOpts=!!(q.opts&&q.opts.some(o=>o));
  render(`
  <div class="topbar"><h1>第 ${round} 題 · 作答中</h1>
    <span class="tag" style="background:var(--accent)">PIN ${pin}</span></div>
  <div class="card">
    <p class="qtext">${q.text?esc(q.text):"（口頭出題）"}</p>
    ${hasOpts?`<div class="opts">${q.opts.map((o,k)=>`
      <div class="opt"><span class="idx">${LETTERS[k]}</span><span>${esc(o)}</span></div>`).join("")}</div>`
      :`<div class="opts lettersonly">${LETTERS.map(L=>`<div class="opt big">${L}</div>`).join("")}</div>`}
    <div class="statline">
      <span>已作答：<span id="acount">0</span> 人</span>
      <span>已加入：<span id="jcount">—</span> 人</span>
    </div>
  </div>
  <button class="btn block" id="endQ">結束作答並公布答案</button>`);
  attach(db.ref(`g/${pin}/ans/${round}`), "value", s=>{
    curAnswerCount=s.numChildren();
    const a=$("#acount"); if(a) a.textContent=curAnswerCount;
  });
  attach(db.ref(`g/${pin}/players`), "value", s=>{
    const j=$("#jcount"); if(j) j.textContent=s.numChildren();
  });
  $("#endQ").onclick=()=>hostReveal(q);
}

/* ---- 公布 ---- */
async function hostReveal(q){
  let snap;
  try{ snap=await db.ref(`g/${pin}/ans/${round}`).get(); }
  catch(e){ showErr("讀取作答資料失敗，請重試。"); return; }
  const ans=snap.val()||{};
  const tally=[0,0,0,0,0,0], answered=[0,0,0,0,0,0];
  Object.values(ans).forEach(a=>{
    if(!a||!(a.t>=0&&a.t<6)||!(a.c>=0&&a.c<6)) return;
    answered[a.t]++;
    if(a.c===q.correct) tally[a.t]++;
  });
  totals=totals.map((v,t)=>v+tally[t]);
  const state={phase:"reveal", round, text:q.text||"", opts:(q.opts&&q.opts.some(o=>o))?q.opts:null,
    correct:q.correct, tally, answered, totals, ts:Date.now()};
  try{ await db.ref(`g/${pin}/state`).set(state); }
  catch(e){ showErr("送出結果失敗，請重試。"); return; }

  const hasOpts=!!state.opts;
  const maxT=Math.max(1,...tally);
  render(`
  <div class="topbar"><h1>第 ${round} 題結果</h1>
    <span class="tag" style="background:var(--ok)">正確答案：${LETTERS[q.correct]}</span></div>
  <div class="card">
    <p class="qtext">${q.text?esc(q.text):"（口頭出題）"}</p>
    ${hasOpts?`<div class="opts">${state.opts.map((o,k)=>`
      <div class="opt ${k===q.correct?"correct":""}"><span class="idx">${LETTERS[k]}</span><span>${esc(o)}</span></div>`).join("")}</div>`:""}
  </div>
  <div class="card">
    <h2>本題各組答對人數</h2>
    <div class="bars mt">${TEAMS.map((tm,t)=>`
      <div class="barrow"><span class="barlabel" style="color:${tm.hex}">${tm.name}</span>
        <div class="bartrack"><div class="barfill" style="background:${tm.hex};width:0%" data-w="${tally[t]/maxT*100}">${tally[t]}</div></div>
        <span class="small">/${answered[t]} 人作答</span></div>`).join("")}
    </div>
  </div>
  <div class="card"><h2>累計答對人數</h2>${totalsBars()}</div>
  <div class="row">
    <button class="btn" id="nextQ">出下一題</button>
    <button class="btn ghost" id="finishGame">結束遊戲，公布最終結果 🏆</button>
  </div>`);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll(".barfill").forEach(el=>{ if(el.dataset.w) el.style.width=Math.max(8,+el.dataset.w)+"%"; });
  }));
  $("#nextQ").onclick=hostQuestionForm;
  $("#finishGame").onclick=hostFinal;
}
function totalsBars(){
  const maxT=Math.max(1,...totals);
  return `<div class="bars mt">${TEAMS.map((tm,t)=>`
    <div class="barrow"><span class="barlabel" style="color:${tm.hex}">${tm.name}</span>
      <div class="bartrack"><div class="barfill" style="background:${tm.hex};width:${Math.max(8,totals[t]/maxT*100)}%">${totals[t]}</div></div>
    </div>`).join("")}</div>`;
}

/* ---- 最終結果 ---- */
async function hostFinal(){
  try{ await db.ref(`g/${pin}/state`).set({phase:"final", round, totals, ts:Date.now()}); }
  catch(e){ showErr("送出失敗，請重試。"); return; }
  const order=[...TEAMS.keys()].sort((a,b)=>totals[b]-totals[a]);
  const top=totals[order[0]];
  render(`
  <div class="topbar"><h1>最終結果 🏆</h1></div>
  <div class="card">
    <div class="rank">${order.map((t,pos)=>`
      <div class="rankrow ${totals[t]===top?"win":""}">
        <span class="pos">${pos+1}</span>
        <span class="tag" style="background:${TEAMS[t].hex}">${TEAMS[t].name}</span>
        <span style="margin-left:auto">${totals[t]} 人次答對</span>
      </div>`).join("")}
    </div>
    <p class="small mt">獲勝：${order.filter(t=>totals[t]===top).map(t=>TEAMS[t].name).join("、")}（同分並列）</p>
  </div>
  <button class="btn block subtle" id="homeB">回首頁</button>`);
  $("#homeB").onclick=()=>{ pin=null; round=0; totals=[0,0,0,0,0,0]; homeScreen(); };
}

/* ============================================================
   玩家
============================================================ */
function playerJoinScreen(){
  const saved=(()=>{ try{ return JSON.parse(LS.get("quizme")||"null"); }catch(e){ return null; } })();
  render(`
  <div class="topbar"><h1>加入遊戲</h1><button class="btn subtle" id="back">回首頁</button></div>
  <div class="card">
    <label>遊戲 PIN 碼</label>
    <input type="text" id="j_pin" inputmode="numeric" maxlength="4" placeholder="4 位數字" value="${saved?esc(saved.pin):""}">
    <label>你的暱稱</label>
    <input type="text" id="j_name" maxlength="12" placeholder="最多 12 個字" value="${saved?esc(saved.name):""}">
    <label>選擇你的組別</label>
    <div class="teams">${TEAMS.map((t,i)=>`
      <button class="teambtn ${saved&&saved.team===i?"sel":""}" style="background:${t.hex}" data-t="${i}">${t.name}</button>`).join("")}</div>
    <button class="btn block mt" id="join">加入遊戲</button>
  </div>`);
  $("#back").onclick=homeScreen;
  let picked=saved?saved.team:-1;
  document.querySelectorAll(".teambtn").forEach(b=>b.onclick=()=>{
    picked=+b.dataset.t;
    document.querySelectorAll(".teambtn").forEach(x=>x.classList.remove("sel"));
    b.classList.add("sel");
  });
  $("#join").onclick=async ()=>{
    const p=$("#j_pin").value.trim(), name=$("#j_name").value.trim();
    if(!/^\d{4}$/.test(p)){ showErr("請輸入 4 位數 PIN 碼。"); return; }
    if(!name){ showErr("請輸入暱稱。"); return; }
    if(picked<0){ showErr("請選擇組別。"); return; }
    let snap;
    try{ snap=await db.ref(`g/${p}/state`).get(); }
    catch(e){ showErr("無法連線，請檢查網路。"); return; }
    if(!snap.exists()){ showErr("找不到這個 PIN 的遊戲，請跟主持人確認。"); return; }
    // 同一支手機重整後沿用同一個 id，避免重複計票
    const sameGame = saved && saved.pin===p;
    me={ id: sameGame?saved.id:rid(), name, team:picked };
    pin=p;
    LS.set("quizme", JSON.stringify({pin:p, id:me.id, name, team:picked}));
    try{ await db.ref(`g/${pin}/players/${me.id}`).set({n:name, t:picked}); }
    catch(e){ showErr("加入失敗，請重試。"); return; }
    playerWatch();
  };
}

let pState=null;
function playerWatch(){
  detachAll();
  attach(db.ref(`g/${pin}/state`), "value", snap=>{
    pState=snap.val();
    playerRender();
  });
}
function playerHeader(){
  const t=TEAMS[me.team];
  return `<div class="topbar"><span class="tag" style="background:${t.hex}">${t.name} · ${esc(me.name)}</span>
    <span class="small">PIN ${pin}</span></div>`;
}
function myAnswerKey(r){ return `quizans:${pin}:${r}`; }

function playerRender(){
  if(!pState){
    $("#app").innerHTML=`${playerHeader()}<div class="card center"><h2>遊戲已結束或被重設</h2></div><div id="err" class="err"></div>`;
    return;
  }
  const app=$("#app");
  if(pState.phase==="lobby"){
    app.innerHTML=`${playerHeader()}
    <div class="card center"><h2>已加入！</h2><p class="small mt">等待主持人出題……</p></div><div id="err" class="err"></div>`;
  }
  else if(pState.phase==="q"){
    const r=pState.round;
    const mineRaw=LS.get(myAnswerKey(r));
    const mine=mineRaw===null?undefined:+mineRaw;
    const hasOpts=!!pState.opts;
    app.innerHTML=`${playerHeader()}
    <div class="card">
      <p class="small">第 ${r} 題</p>
      <p class="qtext">${pState.text?esc(pState.text):"請聽主持人唸題，選出你的答案"}</p>
      ${mine!==undefined?`<div class="banner info">已送出：${LETTERS[mine]}，等待公布答案</div>`:""}
      ${hasOpts
        ?`<div class="opts">${pState.opts.map((o,k)=>`
          <button class="opt ${mine===k?"sel":""}" data-c="${k}" ${mine!==undefined?"disabled":""}>
            <span class="idx">${LETTERS[k]}</span><span>${esc(o)}</span></button>`).join("")}</div>`
        :`<div class="opts lettersonly">${LETTERS.map((L,k)=>`
          <button class="opt big ${mine===k?"sel":""}" data-c="${k}" ${mine!==undefined?"disabled":""}>${L}</button>`).join("")}</div>`}
      ${mine===undefined?'<p class="hint mt">點選一個答案即送出，送出後不能更改。</p>':""}
    </div><div id="err" class="err"></div>`;
    if(mine===undefined){
      document.querySelectorAll(".opt[data-c]").forEach(b=>b.onclick=async ()=>{
        const c=+b.dataset.c;
        document.querySelectorAll(".opt[data-c]").forEach(x=>x.disabled=true);
        try{
          await db.ref(`g/${pin}/ans/${r}/${me.id}`).set({t:me.team, c});
          LS.set(myAnswerKey(r), String(c));
          playerRender();
        }catch(e){
          document.querySelectorAll(".opt[data-c]").forEach(x=>x.disabled=false);
          showErr("送出失敗，請再點一次。");
        }
      });
    }
  }
  else if(pState.phase==="reveal"){
    const r=pState.round;
    const mineRaw=LS.get(myAnswerKey(r));
    const mine=mineRaw===null?undefined:+mineRaw;
    const right=mine===pState.correct;
    const tally=pState.tally||[0,0,0,0,0,0];
    const maxT=Math.max(1,...tally);
    const hasOpts=!!pState.opts;
    app.innerHTML=`${playerHeader()}
    <div class="card">
      ${mine===undefined
        ? '<div class="banner info">你這題沒有作答</div>'
        : right ? '<div class="banner ok">答對了！🎉</div>'
                : `<div class="banner bad">答錯了，正確答案是 ${LETTERS[pState.correct]}</div>`}
      <p class="qtext">${pState.text?esc(pState.text):`第 ${r} 題（口頭出題）`}</p>
      ${hasOpts?`<div class="opts">${pState.opts.map((o,k)=>`
        <div class="opt ${k===pState.correct?"correct":(mine===k?"wrongpick":"")}">
          <span class="idx">${LETTERS[k]}</span><span>${esc(o)}</span></div>`).join("")}</div>`
        :`<div class="opts lettersonly">${LETTERS.map((L,k)=>`
          <div class="opt big ${k===pState.correct?"correct":(mine===k?"wrongpick":"")}">${L}</div>`).join("")}</div>`}
    </div>
    <div class="card">
      <h2>本題各組答對人數</h2>
      <div class="bars mt">${TEAMS.map((tm,t)=>`
        <div class="barrow"><span class="barlabel" style="color:${tm.hex}">${tm.name}</span>
          <div class="bartrack"><div class="barfill" style="background:${tm.hex};width:${Math.max(8,tally[t]/maxT*100)}%">${tally[t]}</div></div>
        </div>`).join("")}</div>
      <p class="small mt">等待主持人出下一題……</p>
    </div><div id="err" class="err"></div>`;
  }
  else if(pState.phase==="final"){
    const totals=pState.totals||[0,0,0,0,0,0];
    const order=[...TEAMS.keys()].sort((a,b)=>totals[b]-totals[a]);
    const top=totals[order[0]];
    const winners=order.filter(t=>totals[t]===top);
    const iWon=winners.includes(me.team);
    app.innerHTML=`${playerHeader()}
    <div class="card center">
      <h1>${iWon?"你們這組獲勝！🏆":"比賽結束"}</h1>
      <p class="small mt">獲勝組別：${winners.map(t=>TEAMS[t].name).join("、")}</p>
    </div>
    <div class="card"><div class="rank">${order.map((t,pos)=>`
      <div class="rankrow ${totals[t]===top?"win":""}">
        <span class="pos">${pos+1}</span>
        <span class="tag" style="background:${TEAMS[t].hex}">${TEAMS[t].name}</span>
        <span style="margin-left:auto">${totals[t]} 人次答對</span>
      </div>`).join("")}</div></div>
    <button class="btn block subtle" id="homeB">回首頁</button><div id="err" class="err"></div>`;
    $("#homeB").onclick=()=>{ detachAll(); LS.del("quizme"); homeScreen(); };
  }
}

/* ====== 啟動 ====== */
homeScreen();
</script>
</body>
</html>
